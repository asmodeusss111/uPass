<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>uPass — Двухфакторная аутентификация</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #06040f;
      --surface:  #0e0c1f;
      --surface2: #131028;
      --border:   #1e1a38;
      --violet:   #a855f7;
      --violet-dim:#7c3aed;
      --violet-dk:#4c1d95;
      --violet-gl:rgba(168,85,247,0.12);
      --violet-f: rgba(168,85,247,0.06);
      --indigo:   #6366f1;
      --green:    #22d3a0;
      --text:     #e4e0f5;
      --text-mid: #8b82b8;
      --text-dim: #4a4470;
      --red:      #f87171;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    body::after {
      content: '';
      position: fixed;
      top: -20vh; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--violet-dk), transparent);
    }
    .logo {
      display: flex; align-items: center; gap: 11px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--violet-f);
      border: 1px solid var(--violet-dk);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      color: var(--violet);
      box-shadow: 0 0 14px var(--violet-gl);
    }
    .logo-title { font-size: 17px; font-weight: 800; }
    .logo-sub   { font-size: 10px; color: var(--text-dim); letter-spacing: 0.07em; }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 12px; color: var(--text-dim); margin-bottom: 24px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    label { font-size: 11.5px; font-weight: 600; color: var(--text-mid); }
    input[name="code"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 13px;
      color: var(--text);
      font-size: 26px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-align: center;
      outline: none;
      width: 100%;
      transition: border-color .2s, box-shadow .2s;
    }
    input[name="code"]::placeholder { color: var(--text-dim); font-size: 20px; letter-spacing: 0.2em; }
    input[name="code"]:focus {
      border-color: var(--violet-dk);
      box-shadow: 0 0 0 3px var(--violet-gl);
    }
    .error {
      background: rgba(248,113,113,0.07);
      border: 1px solid rgba(248,113,113,0.22);
      border-radius: 7px;
      padding: 9px 12px;
      color: var(--red);
      font-size: 12px;
      margin-bottom: 14px;
    }
    button[type="submit"] {
      width: 100%;
      background: linear-gradient(135deg, var(--violet-dim), var(--indigo));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.3);
      transition: opacity .2s, box-shadow .2s;
    }
    button[type="submit"]:hover {
      opacity: 0.88;
      box-shadow: 0 4px 28px rgba(124,58,237,0.45);
    }
    .setup-toggle {
      width: 100%;
      margin-top: 20px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text-dim);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color .2s, color .2s;
      box-shadow: none;
    }
    .setup-toggle:hover {
      border-color: var(--violet-dk);
      color: var(--violet);
      background: var(--violet-f);
      opacity: 1;
      box-shadow: none;
    }
    .setup-section {
      display: none;
      margin-top: 16px;
      text-align: center;
    }
    .setup-section.open { display: block; }
    .qr-wrap {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      display: inline-block;
      margin-bottom: 14px;
    }
    .qr-wrap svg { display: block; width: 180px; height: 180px; }
    .secret-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .secret-key {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--green);
      letter-spacing: 0.1em;
      word-break: break-all;
      cursor: pointer;
      transition: border-color .2s;
    }
    .secret-key:hover { border-color: var(--violet-dk); }
    .copy-hint {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 5px;
    }
    .back-link {
      display: block;
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
      transition: color .2s;
    }
    .back-link:hover { color: var(--violet); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <div class="logo-title">uPass</div>
        <div class="logo-sub">ADMIN PANEL</div>
      </div>
    </div>

    <h2>Двухфакторная аутентификация</h2>
    <div class="sub">Введите 6-значный код из приложения</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/2fa" id="form2fa">
      <div class="field">
        <input type="text" name="code" placeholder="000 000"
               maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
               autocomplete="one-time-code" autofocus />
      </div>
      <button type="submit">Подтвердить</button>
    </form>

    <button type="button" class="setup-toggle" onclick="toggleSetup()" id="setup-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      Настройка приложения
      <svg id="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:auto">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>

    <div class="setup-section" id="setup-section">
      <div class="qr-wrap">{{ qr_svg | safe }}</div>
      <div class="secret-label">Или введите ключ вручную в приложении:</div>
      <div class="secret-key" onclick="copySecret(this)">{{ totp_secret }}</div>
      <div class="copy-hint" id="copy-hint">Нажми чтобы скопировать</div>
    </div>

    <a href="/admin/login" class="back-link">← Назад ко входу</a>
  </div>

  <script>
    // Авто-сабмит при вводе 6 цифр
    const codeInput = document.querySelector('input[name="code"]');
    codeInput.addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '');
      if (this.value.length === 6) {
        document.getElementById('form2fa').submit();
      }
    });

    function toggleSetup() {
      const section = document.getElementById('setup-section');
      const chevron = document.getElementById('chevron');
      const isOpen  = section.classList.toggle('open');
      chevron.style.transform = isOpen ? 'rotate(180deg)' : '';
    }

    function copySecret(el) {
      navigator.clipboard.writeText(el.textContent.trim()).then(() => {
        const hint = document.getElementById('copy-hint');
        hint.textContent = 'Скопировано!';
        hint.style.color = 'var(--green)';
        setTimeout(() => {
          hint.textContent = 'Нажми чтобы скопировать';
          hint.style.color = '';
        }, 2000);
      });
    }
  </script>
</body>
</html>
