<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — uPass</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #020817;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none;
    }
    .orb1 { width: 420px; height: 420px; background: #1d4ed8; opacity: 0.18; top: -120px; left: -120px; animation: float1 9s ease-in-out infinite; }
    .orb2 { width: 320px; height: 320px; background: #0891b2; opacity: 0.14; bottom: -100px; right: -100px; animation: float2 11s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,40px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-30px)} }

    .particles { position: fixed; inset: 0; pointer-events: none; }
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(59,130,246,0.5);
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .container {
      max-width: 540px; width: 100%;
      text-align: center; position: relative; z-index: 1;
    }

    /* ── Lock ── */
    .lock-wrap {
      margin-bottom: 16px;
      position: relative;
      display: inline-block;
    }

    /* Pulse ring on denied flash */
    .lock-ring {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 2px solid rgba(239,68,68,0.8);
      opacity: 0;
      animation: ringPulse 0.4s ease 0.7s forwards;
    }
    .lock-ring2 {
      position: absolute;
      inset: -32px;
      border-radius: 50%;
      border: 1px solid rgba(239,68,68,0.4);
      opacity: 0;
      animation: ringPulse2 0.6s ease 0.75s forwards;
    }
    @keyframes ringPulse  { 0%{opacity:0.9;transform:scale(0.6)} 100%{opacity:0;transform:scale(1.6)} }
    @keyframes ringPulse2 { 0%{opacity:0.6;transform:scale(0.5)} 100%{opacity:0;transform:scale(2)} }

    .lock-icon {
      font-size: 72px;
      display: inline-block;
      filter: drop-shadow(0 0 20px rgba(59,130,246,0.4));
      transform-origin: center bottom;
      animation:
        dropIn     0.5s cubic-bezier(0.22,1,0.36,1) 0s both,
        bounce1    0.25s ease-in-out 0.5s both,
        bounce2    0.18s ease-in-out 0.75s both,
        shake      0.35s ease-in-out 1.0s both,
        lockFloat  3.5s ease-in-out 1.5s infinite;
    }
    @keyframes dropIn  { from{opacity:0;transform:translateY(-120px) scale(0.6)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes bounce1 { 0%{transform:translateY(0)} 50%{transform:translateY(-18px)} 100%{transform:translateY(0)} }
    @keyframes bounce2 { 0%{transform:translateY(0)} 50%{transform:translateY(-8px)} 100%{transform:translateY(0)} }
    @keyframes shake   {
      0%,100%{transform:translateX(0) rotate(0)}
      15%{transform:translateX(-8px) rotate(-6deg)}
      30%{transform:translateX(8px) rotate(6deg)}
      45%{transform:translateX(-6px) rotate(-4deg)}
      60%{transform:translateX(6px) rotate(4deg)}
      75%{transform:translateX(-3px) rotate(-2deg)}
      90%{transform:translateX(3px) rotate(2deg)}
    }
    @keyframes lockFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    /* ── 404 digits appear one by one ── */
    .code-404 {
      font-size: 100px; font-weight: 900; line-height: 1;
      margin-bottom: 16px;
      display: flex; justify-content: center; gap: 4px;
      filter: drop-shadow(0 0 30px rgba(59,130,246,0.3));
    }
    .digit {
      background: linear-gradient(135deg, #3b82f6, #06b6d4, #818cf8);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: gradShift 4s ease infinite;
    }
    .digit:nth-child(1) { animation: digitIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.6s both, gradShift 4s ease 1.6s infinite; }
    .digit:nth-child(2) { animation: digitIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.8s both, gradShift 4s ease 1.8s infinite; }
    .digit:nth-child(3) { animation: digitIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 2.0s both, gradShift 4s ease 2.0s infinite; }
    @keyframes digitIn  { from{opacity:0;transform:scale(0.3) rotateX(90deg)} to{opacity:1;transform:scale(1) rotateX(0)} }
    @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

    .title {
      font-size: 24px; font-weight: 700; color: #f1f5f9; margin-bottom: 10px;
      animation: fadeUp 0.5s ease 2.3s both;
    }
    .desc {
      font-size: 14px; color: #64748b; margin-bottom: 32px; line-height: 1.7;
      animation: fadeUp 0.5s ease 2.45s both;
    }

    /* ── Card ── */
    .card {
      background: rgba(15,23,42,0.85);
      border: 1px solid rgba(59,130,246,0.18);
      border-radius: 12px; padding: 20px 24px; margin-bottom: 28px;
      font-family: 'Courier New', monospace; text-align: left;
      position: relative; overflow: hidden;
      animation: fadeUp 0.5s ease 2.6s both;
      box-shadow: 0 0 30px rgba(59,130,246,0.06);
    }
    .card::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,0.07), transparent);
      animation: shimmer 3s ease-in-out 3s infinite;
    }
    @keyframes shimmer { 0%{left:-100%} 100%{left:200%} }

    .card-line { font-size: 13px; color: #475569; margin-bottom: 6px; line-height: 1.5; }
    .card-line:last-child { margin-bottom: 0; }
    .val-red   { color: #f87171; }
    .val-blue  { color: #60a5fa; }
    .val-green { color: #34d399; }

    /* ── Buttons ── */
    .actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      animation: fadeUp 0.5s ease 2.75s both;
    }
    .btn {
      padding: 12px 26px; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; text-decoration: none; border: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-3px); }
    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: #fff; box-shadow: 0 4px 20px rgba(37,99,235,0.4);
    }
    .btn-primary:hover { box-shadow: 0 8px 30px rgba(37,99,235,0.55); }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(59,130,246,0.35); color: #60a5fa;
    }
    .btn-outline:hover { border-color: #3b82f6; background: rgba(59,130,246,0.08); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="lock-wrap">
      <div class="lock-ring"></div>
      <div class="lock-ring2"></div>
      <span class="lock-icon">🔒</span>
    </div>

    <div class="code-404">
      <span class="digit">4</span>
      <span class="digit">0</span>
      <span class="digit">4</span>
    </div>

    <div class="title">Доступ запрещён</div>
    <div class="desc">
      Страница не найдена или у вас нет прав для её просмотра.<br>
      Проверьте адрес и попробуйте снова.
    </div>

    <div class="card">
      <div class="card-line">status: <span class="val-red">404 NOT FOUND</span></div>
      <div class="card-line">path:&nbsp;&nbsp; <span class="val-blue">{{ path }}</span></div>
      <div class="card-line">auth:&nbsp;&nbsp; <span class="val-green">uPass v2 · Argon2id</span></div>
    </div>

    <div class="actions">
      <a href="/" class="btn btn-primary">← На главную</a>
      <a href="/login" class="btn btn-outline">Войти</a>
    </div>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random() * 100}%;
        animation-duration:${Math.random() * 10 + 8}s;
        animation-delay:${Math.random() * 8}s;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
