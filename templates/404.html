<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — uPass</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020817;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container { max-width: 540px; width: 100%; text-align: center; }
    .lock-icon {
      font-size: 72px;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 24px rgba(59,130,246,0.4));
    }
    .code-404 {
      font-size: 96px;
      font-weight: 900;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 10px;
    }
    .desc {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .card {
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 28px;
      font-family: monospace;
      text-align: left;
    }
    .card-line { font-size: 13px; color: #475569; margin-bottom: 4px; }
    .card-line span { color: #ef4444; }
    .card-line .ok { color: #10b981; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 11px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: opacity 0.18s;
    }
    .btn:hover { opacity: 0.82; }
    .btn-primary { background: linear-gradient(135deg, #3b82f6, #06b6d4); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid rgba(59,130,246,0.3); color: #3b82f6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="lock-icon">🔒</div>
    <div class="code-404">404</div>
    <div class="title">Доступ запрещён</div>
    <div class="desc">Страница не найдена или у вас нет прав для её просмотра.<br>Проверьте адрес и попробуйте снова.</div>
    <div class="card">
      <div class="card-line">status: <span>404 NOT FOUND</span></div>
      <div class="card-line">path: <span>{{ path }}</span></div>
      <div class="card-line">auth: <span class="ok">uPass v2 · Argon2id</span></div>
    </div>
    <div class="actions">
      <a href="/" class="btn btn-primary">← На главную</a>
      <a href="/login" class="btn btn-outline">Войти</a>
    </div>
  </div>
</body>
</html>
