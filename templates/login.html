<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>uPass — Вход в панель</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #06040f;
      --surface:  #0e0c1f;
      --surface2: #131028;
      --border:   #1e1a38;
      --violet:   #a855f7;
      --violet-dim:#7c3aed;
      --violet-dk:#4c1d95;
      --violet-gl:rgba(168,85,247,0.12);
      --violet-f: rgba(168,85,247,0.06);
      --indigo:   #6366f1;
      --text:     #e4e0f5;
      --text-mid: #8b82b8;
      --text-dim: #4a4470;
      --red:      #f87171;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20vh; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse,
        rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--violet-dk), transparent);
    }

    .logo {
      display: flex; align-items: center; gap: 11px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--violet-f);
      border: 1px solid var(--violet-dk);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      color: var(--violet);
      box-shadow: 0 0 14px var(--violet-gl);
    }

    .logo-title { font-size: 17px; font-weight: 800; }
    .logo-sub   { font-size: 10px; color: var(--text-dim); letter-spacing: 0.07em; }

    h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 12px; color: var(--text-dim); margin-bottom: 24px; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }

    label { font-size: 11.5px; font-weight: 600; color: var(--text-mid); }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 13px;
      color: var(--text);
      font-size: 13.5px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input::placeholder { color: var(--text-dim); }

    input:focus {
      border-color: var(--violet-dk);
      box-shadow: 0 0 0 3px var(--violet-gl);
    }

    .error {
      background: rgba(248,113,113,0.07);
      border: 1px solid rgba(248,113,113,0.22);
      border-radius: 7px;
      padding: 9px 12px;
      color: var(--red);
      font-size: 12px;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, var(--violet-dim), var(--indigo));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.3);
      transition: opacity .2s, box-shadow .2s;
    }

    button:hover {
      opacity: 0.88;
      box-shadow: 0 4px 28px rgba(124,58,237,0.45);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <div class="logo-title">uPass</div>
        <div class="logo-sub">ADMIN PANEL</div>
      </div>
    </div>

    <h2>Вход</h2>
    <div class="sub">Введите учётные данные администратора</div>

    {% if error %}
    <div class="error">
      {{ error }}
      {% if attempts is defined and attempts > 0 %}
      <br><span style="opacity:.75;font-size:11px">Осталось попыток: {{ attempts }}</span>
      {% endif %}
    </div>
    {% endif %}

    <form method="post" action="/admin/login">
      <div class="field">
        <label>Логин</label>
        <input type="text" name="username" placeholder="admin" autocomplete="username" required />
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit">Войти</button>
    </form>
  </div>
</body>
</html>
